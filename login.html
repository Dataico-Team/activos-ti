<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Activos TI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f4f6; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 32px; background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center" style="margin-bottom: 24px;">
            <div class="brand-logo" style="margin: 0 auto 16px; width: 64px; height: 64px; border-radius: 16px; background: #ff6b57; color: #fff; font-size: 32px; font-weight: bold; display: flex; justify-content: center; align-items: center;">D</div>
            <h2>Iniciar Sesión</h2>
            <p style="color: #6b7280; font-size: 14px;">Acceso Administrativo - Dataico</p>
        </div>

        <form id="loginForm" class="form">
            <label>Usuario o Correo</label>
            <input type="text" id="email" required placeholder="admin o tu@empresa.com">
            <label>Contraseña</label>
            <input type="password" id="password" required>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal; margin:10px 0;">
                <input type="checkbox" id="autoRegister" checked style="width:auto;"> Crear cuenta si no existe
            </label>
            <button type="submit" class="btn-primary" style="width:100%; background:#ff6b57;">Ingresar</button>
        </form>

        <div id="setupMfaSection" class="hidden text-center">
            <h3>Activar 2FA</h3>
            <p style="font-size:13px; color:#6b7280;">Escanea el código con Google Authenticator</p>
            <canvas id="qrImage" style="margin: 0 auto;"></canvas>
            <form id="setupMfaForm" class="form">
                <input type="text" id="setupMfaCode" required placeholder="Código 6 dígitos" style="text-align:center;">
                <button type="submit" class="btn-primary" style="width:100%; background:#ff6b57;">Verificar y Activar</button>
            </form>
        </div>

        <div id="mfaSection" class="hidden text-center">
            <h3>Verificación 2FA</h3>
            <p style="font-size:13px; color:#6b7280;">Ingresa el código de tu celular</p>
            <form id="mfaForm" class="form">
                <input type="text" id="mfaCode" required placeholder="000 000" style="text-align:center;">
                <button type="submit" class="btn-primary" style="width:100%; background:#ff6b57;">Acceder</button>
            </form>
        </div>
    </div>

    <!-- LÓGICA DE BYPASS (INSTANTÁNEA) -->
    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            const u = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            
            if (u === 'admin' && p === '123') {
                e.preventDefault();
                console.log("Acceso admin detectado.");
                localStorage.setItem('test_bypass', 'true');
                location.href = 'index.html';
                return false;
            }
            // Si no es admin, permitimos que el siguiente script de Supabase lo maneje (si carga)
        };
    </script>

    <!-- LÓGICA DE SUPABASE (CONEXIÓN REAL) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        (async function() {
            try {
                const sURL = 'https://hsczygcbmtyzkzeksajm.supabase.co', sKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzY3p5Z2NibXR5emt6ZWtzYWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk0NDksImV4cCI6MjA5MTI1NTQ0OX0.YetS-bD8wd_ZsLjeEhO_9ZsrlnxHd-MVPcC0iQS5EF0';
                if(!window.supabase) return;
                const supabase = window.supabase.createClient(sURL, sKEY);
                let globalFactorId = null;

                const originalForm = document.getElementById('loginForm');
                const existingSubmit = originalForm.onsubmit;

                originalForm.onsubmit = async (e) => {
                    // Primero ejecutamos el bypass
                    if (existingSubmit(e) === false) return;

                    // Si no fue bypass, seguimos con Supabase
                    e.preventDefault();
                    const email = document.getElementById('email').value, password = document.getElementById('password').value;
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    
                    if (error) {
                        if(document.getElementById('autoRegister').checked) {
                            const { data:uD, error:uE } = await supabase.auth.signUp({ email, password });
                            if(uE) return alert(uE.message);
                            if(uD.session) return hMFA(uD.session, supabase);
                        }
                        return alert(error.message);
                    }
                    if (data.session) hMFA(data.session, supabase);
                };

                async function hMFA(session, sb) {
                    const { data } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
                    if (data.currentLevel === 'aal1' && data.nextLevel === 'aal2') {
                        document.getElementById('loginForm').classList.add('hidden');
                        document.getElementById('mfaSection').classList.remove('hidden');
                    } else if (data.currentLevel === 'aal1' && data.nextLevel === 'aal1') {
                        enroll(sb);
                    } else { location.href = 'index.html'; }
                }

                async function enroll(sb) {
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('setupMfaSection').classList.remove('hidden');
                    const { data } = await sb.auth.mfa.enroll({ factorType: 'totp' });
                    globalFactorId = data.id;
                    QRCode.toCanvas(document.getElementById('qrImage'), data.totp.uri);
                }

                // ... resten de listeners para 2FA real ...
                document.getElementById('setupMfaForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const code = document.getElementById('setupMfaCode').value;
                    const chall = await supabase.auth.mfa.challenge({ factorId: globalFactorId });
                    const verify = await supabase.auth.mfa.verify({ factorId: globalFactorId, challengeId: chall.data.id, code });
                    if(!verify.error) location.href = 'index.html';
                };

            } catch(e) { console.error("Error en login real:", e); }
        })();
    </script>
</body>
</html>
