<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Activos TI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f4f6; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 32px; background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center" style="margin-bottom: 24px;">
            <div class="brand-logo" style="margin:0 auto 16px; width:64px; height:64px; border-radius:16px; background:#ff6b57; color:#fff; font-size:32px; font-weight:bold; display:flex; justify-content:center; align-items:center;">D</div>
            <h2 id="loginTitle">Iniciar Sesión</h2>
            <p style="color:#6b7280; font-size:14px;">Ingresa con tu Correo o Usuario</p>
        </div>

        <!-- FORMULARIO 1: LOGIN -->
        <form id="loginForm" class="form">
            <label>Correo o Usuario</label>
            <input type="text" id="userInput" required placeholder="ej: alejandro_ti o correo@abc.com">
            <label>Contraseña</label>
            <input type="password" id="password" required>
            <button type="submit" class="btn-primary" style="width:100%; background:#ff6b57; margin-top:10px;">Ingresar</button>
        </form>

        <!-- FORMULARIO 2: CAMBIO CLAVE OBLIGATORIO -->
        <div id="changePassSection" class="hidden">
            <p style="color:#ef4444; font-weight:bold; margin-bottom:15px;">⚠️ Por seguridad, debes cambiar tu clave temporal.</p>
            <form id="changePassForm" class="form">
                <label>Nueva Contraseña</label>
                <input type="password" id="newPassword" required minlength="6">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" required minlength="6">
                <button type="submit" class="btn-primary" style="width:100%;">Actualizar Contraseña</button>
            </form>
        </div>

        <!-- FORMULARIO 3: ACTIVAR 2FA (QR) -->
        <div id="setupMfaSection" class="hidden text-center">
            <h3>Activar Google Authenticator</h3>
            <canvas id="qrImage" style="margin: 0 auto 15px;"></canvas>
            <form id="setupMfaForm" class="form">
                <input type="text" id="setupMfaCode" required placeholder="6 dígitos" style="text-align:center;">
                <button type="submit" class="btn-primary" style="width:100%;">Activar y Acceder</button>
            </form>
        </div>

        <!-- FORMULARIO 4: VERIFICAR 2FA RECURRENTE -->
        <div id="mfaSection" class="hidden text-center">
            <h3>Verificación 2FA</h3>
            <form id="mfaForm" class="form">
                <input type="text" id="mfaCode" required placeholder="000 000" style="text-align:center;">
                <button type="submit" class="btn-primary" style="width:100%;">Verificar</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        (async function() {
            const sURL = 'https://hsczygcbmtyzkzeksajm.supabase.co', sKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzY3p5Z2NibXR5emt6ZWtzYWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk0NDksImV4cCI6MjA5MTI1NTQ0OX0.YetS-bD8wd_ZsLjeEhO_9ZsrlnxHd-MVPcC0iQS5EF0';
            const supabase = window.supabase.createClient(sURL, sKEY);
            let gFactorId = null;

            document.getElementById('loginForm').onsubmit = async (e) => {
                e.preventDefault();
                let userVal = document.getElementById('userInput').value;
                const password = document.getElementById('password').value;

                // Bypass admin
                if(userVal === 'admin' && password === '123') {
                    localStorage.setItem('test_bypass', 'true');
                    location.href = 'index.html'; return;
                }

                let finalEmail = userVal;
                // Si no tiene @, es un nombre de usuario: buscar el correo asociado
                if (!userVal.includes('@')) {
                    const { data: profile, error: pErr } = await supabase.from('perfiles').select('email').eq('usuario', userVal).single();
                    if (pErr || !profile) return alert("Nombre de usuario no encontrado.");
                    finalEmail = profile.email;
                }

                const { data, error } = await supabase.auth.signInWithPassword({ email: finalEmail, password });
                if(error) return alert("Error de acceso: " + error.message);
                handleSecurityFlow(data.session);
            };

            async function handleSecurityFlow(session) {
                const { data: profile } = await supabase.from('perfiles').select('debe_cambiar_clave').eq('id', session.user.id).single();
                if (profile && profile.debe_cambiar_clave) { showSection('changePassSection'); return; }

                const { data: mfa } = await supabase.auth.mfa.getAuthenticatorAssuranceLevel();
                if (mfa.nextLevel === 'aal2' && mfa.currentLevel === 'aal1') { showSection('mfaSection'); }
                else if (mfa.nextLevel === 'aal1' && mfa.currentLevel === 'aal1') { enrollMFA(); }
                else { location.href = 'index.html'; }
            }

            function showSection(id) {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('changePassSection').classList.add('hidden');
                document.getElementById('setupMfaSection').classList.add('hidden');
                document.getElementById('mfaSection').classList.add('hidden');
                document.getElementById(id).classList.remove('hidden');
            }

            document.getElementById('changePassForm').onsubmit = async (e) => {
                e.preventDefault();
                const newP = document.getElementById('newPassword').value;
                const { error } = await supabase.auth.updateUser({ password: newP });
                if(error) return alert(error.message);
                const user = (await supabase.auth.getUser()).data.user;
                await supabase.from('perfiles').update({ debe_cambiar_clave: false }).eq('id', user.id);
                location.reload();
            };

            async function enrollMFA() {
                showSection('setupMfaSection');
                const { data } = await supabase.auth.mfa.enroll({ factorType: 'totp' });
                gFactorId = data.id;
                QRCode.toCanvas(document.getElementById('qrImage'), data.totp.uri);
            }

            document.getElementById('setupMfaForm').onsubmit = async (e) => {
                e.preventDefault();
                const code = document.getElementById('setupMfaCode').value;
                const chall = await supabase.auth.mfa.challenge({ factorId: gFactorId });
                await supabase.auth.mfa.verify({ factorId: gFactorId, challengeId: chall.data.id, code });
                location.href = 'index.html';
            };

            document.getElementById('mfaForm').onsubmit = async (e) => {
                e.preventDefault();
                const code = document.getElementById('mfaCode').value;
                const { data: factors } = await supabase.auth.mfa.listFactors();
                const factor = factors.all[0];
                const chall = await supabase.auth.mfa.challenge({ factorId: factor.id });
                await supabase.auth.mfa.verify({ factorId: factor.id, challengeId: chall.data.id, code });
                location.href = 'index.html';
            };
        })();
    </script>
</body>
</html>
